<div class="min-h-[250px] flex items-start justify-center pt-2"> @if (!showGuestInput && !showLoginInput){

  <div class="flex gap-4">
    <button (click)="toggleGuestInput()" class="px-6 py-3 bg-gray-100 hover:bg-gray-200 text-red-700 font-medium rounded-lg transition border border-gray-300">
      Continue as guest
    </button>

    <button (click)="toggleLoginInput()" class="px-6 py-3 bg-red-700 hover:bg-gray-800 text-white font-medium rounded-lg transition shadow-md">
      Login with account
    </button>

  </div>
} @if(showGuestInput) {

  <div class="relative flex flex-col items-center">
    @if(errorMessage()) {
      <span class="text-red-500 text-sm font-semibold mb-2">{{ errorMessage()}}</span>
    }
    <div class="flex gap-2 shadow-sm rounded">
      <input type="text" [(ngModel)]="guestNickname" placeholder="Enter your nickname..."
             class="px-4 py-3 border border-gray-300 rounded focus:border-red-600 focus:ring-1 focus:ring-red-600 outline-none transition min-w-[250px] text-gray-800">

      <button (click)="playAsGuest()" class="px-6 py-3 bg-red-600 hover:bg-red-700 text-white font-bold rounded shadow transition">
        Play
      </button>
    </div>

    <button (click)="toggleGuestInput()" class="mt-2 text-sm text-gray-400 hover:text-red-600 underline transition">
      cancel & go back
    </button>

  </div>
} @if(showLoginInput) {


  <div class="relative flex flex-col items-center">
    @if(errorMessage()) {
      <span class="text-red-500 text-sm font-semibold mb-2">{{ errorMessage() }}</span>
    }

    <div class="flex flex-col gap-3 w-full max-w-xs shadow-sm rounded">

      <input type="email" [(ngModel)]="loginNickname" placeholder="Email"
             class="w-full px-4 py-3 border border-gray-300 rounded focus:border-red-600 focus:ring-1 focus:ring-red-600 outline-none transition min-w-[220px] text-gray-800">

      <input type="password" [(ngModel)]="loginPassword" placeholder="Password"
             class="w-full px-4 py-3 border border-gray-300 rounded focus:border-red-600 focus:ring-1 focus:ring-red-600 outline-none transition min-w-[220px] text-gray-800">

      <button (click)="loginWithAccount()" class="w-full px-6 py-3 mt-2 bg-red-600 hover:bg-gray-800 text-white font-bold rounded shadow transition">
        Login
      </button>

    </div>

    <button (click)="toggleLoginInput()" class="mt-2 text-sm text-gray-400 hover:text-red-600 underline transition">
      cancel & go back
    </button>

  </div>

}</div>
