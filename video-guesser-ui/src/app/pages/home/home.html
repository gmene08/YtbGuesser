<div class="min-h-screen bg-white flex flex-col text-red-700 font-youtube">

  <div class="flex justify-between items-center px-8 py-4 bg-white border-b border-gray-200">
    <div class="font-bold text-2xl tracking-tighter">Yg.</div>
    <div class="space-x-4">
    </div>
  </div>

  <div class="flex-grow flex flex-col items-center justify-start pt-32 text-center px-4">

    <div class="mb-4">
      <h1 class="text-6xl md:text-7xl font-bold tracking-tight text-red-700">
        Ytb Guesser
      </h1>
    </div>

    <div class="mb-15">
      <h3 class="text-xl md:text-2xl text-gray-500 max-w-2xl">
        Guess the view count of videos based on the thumbnail
      </h3>
    </div>


      @if (!isUserLoggedIn) {

        <app-login (onLoginSuccess)="handleLoginSuccess()"></app-login>

      } @else {

        <div class="flex flex-col gap-4 items-center">
          <h2 class="text-2xl font-bold text-gray-800">Welcome!</h2>

          <button class="w-full min-w-[250px] px-6 py-4 bg-red-600 hover:bg-red-700 text-white text-lg font-bold rounded-lg shadow-md transition">
            Create Room
          </button>

          <button class="w-full min-w-[250px] px-6 py-4 bg-gray-800 hover:bg-gray-900 text-white text-lg font-bold rounded-lg shadow-md transition">
            Join Random Match
          </button>
        </div>

      }

  </div>

</div>
