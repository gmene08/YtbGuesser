<header class="w-full max-w-screen-2xl mx-auto flex justify-between items-center mb-3 px-4">
  <h1 class="text-3xl md:text-4xl font-black tracking-tight text-gray-800 uppercase">
    Youtube <span class="text-red-600">Guesser</span>
  </h1>

  <div class="px-6 py-2 bg-red-100 text-red-700 font-black rounded-full text-xl border-2 border-red-200 shadow-sm">
    ROUND {{matchData()?.roundNumber}} <span class="opacity-50 font-bold">/ {{matchData()?.maxRounds}}</span>
  </div>
</header>

<main class="flex flex-col xl:flex-row gap-6 w-full max-w-screen-2xl mx-auto h-full items-stretch px-4 pb-8">

  <aside class="w-full xl:w-72 bg-white rounded-2xl shadow-sm border border-gray-200 p-4 flex flex-col">
    <h2 class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-4 px-2">Rankings</h2>
    <app-player-leaderboard
      class="flex-grow w-full"
      [roomData]="roomData()">
    </app-player-leaderboard>
  </aside>

  <section class="flex-1 flex flex-col gap-6 items-center">


      <div class="w-full max-w-4xl aspect-video bg-black rounded-2xl overflow-hidden shadow-2xl relative">
        <youtube-player
          [videoId]="videoUrl()"
          class="w-full h-full absolute inset-0"
          [playerVars]="{
        controls: 0,
        disablekb: 1,
        rel: 0,
        modestbranding: 1
      }"
        >
        </youtube-player>
      </div>



    <div class="w-full max-w-2xl bg-white p-2 rounded-xl shadow-lg border border-gray-200 flex items-center transition-all focus-within:ring-4 focus-within:ring-red-100 focus-within:border-red-400">
      <div class="pl-4 text-gray-400 text-2xl">👁️</div>
      <input
        type="number"
        (input) ="userGuess.set(+($any($event.target).value || 0))"
        placeholder="How many views?"
        class="flex-1 bg-transparent px-4 py-3 outline-none text-2xl font-black text-gray-700 text-center placeholder:text-gray-300 placeholder:font-medium disabled:opacity-50"
      />
      <button
        (click)="guess()"
        class="px-8 py-4 bg-red-600 hover:bg-red-700 text-white font-bold text-xl rounded-lg shadow-md transition transform active:scale-95">
        GUESS
      </button>
    </div>

  </section>

  <aside class="w-full xl:w-80 bg-gray-900 rounded-2xl shadow-xl p-6 text-white flex flex-col items-center justify-center relative overflow-hidden border border-gray-800">

    <div class="text-center z-10 flex flex-col items-center gap-3">
      <span class="text-6xl animate-bounce">🕵️‍♂️</span>
      <h3 class="font-black text-2xl text-gray-100 uppercase tracking-wide">Classified</h3>
      <p class="text-sm text-gray-400 px-4">Make your guess to reveal the video title and channel.</p>
    </div>

    <div class="absolute inset-0 opacity-10 bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-white to-transparent pointer-events-none"></div>
  </aside>

</main>
