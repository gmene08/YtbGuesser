<div class="flex flex-col p-4 pt-4 rounded-lg">
  <div class="flex justify-start mb-10">
    <h2 class="text-xl font-bold text-gray-800 border-b border-gray-200 pb-1 w-full">Player rankings</h2>
  </div>

  <div class="grid grid-cols-1 sm:grid-cols-1 gap-4">
    @if (roomData(); as room) {
      @for (player of room.players; track player.id) {
        <app-player-score
          [playerNickname]="player.nickname"
        ></app-player-score>
      }
    }
  </div>
</div>
