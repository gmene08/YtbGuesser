<div class="p-4 pt-10 flex flex-col gap-6 h-full justify-between">

  <h2 class="text-xl font-bold text-gray-800 border-b border-gray-200 pb-3">
    Game Settings
  </h2>

  <div class="flex flex-col gap-2">
    <label class="text-sm font-semibold text-gray-600 uppercase tracking-wider">Max Players</label>

    <input type="number"
           [value]="room()?.maxPlayers"
           [disabled]="!isOwner()"
           class="px-4 py-2 border border-gray-300 rounded outline-none transition disabled:bg-gray-100 disabled:text-gray-500 disabled:cursor-not-allowed">
  </div>

  <form action="">
    <div class="flex flex-col gap-2">
      <label class="text-sm font-semibold text-gray-600 uppercase tracking-wider">Rounds</label>

      <input type="number"
             [value]="5"
             [disabled]="!isOwner()"
             class="px-4 py-2 border border-gray-300 rounded outline-none transition disabled:bg-gray-100 disabled:text-gray-500 disabled:cursor-not-allowed">
    </div>

    <div class="flex flex-col gap-2">
      <label class="text-sm font-semibold text-gray-600 uppercase tracking-wider">Category</label>

      <select [disabled]="!isOwner()"
              class="px-4 py-2 border border-gray-300 rounded outline-none disabled:bg-gray-100 disabled:text-gray-500 disabled:cursor-not-allowed">
        @for (category of categories(); track category) {
          <option value="{{category}}">{{category}}</option>
        }
      </select>
    </div>


    <div class="mt-auto pt-6">
      @if(isOwner()) {
        <button class="w-full py-4 bg-red-600 hover:bg-red-700 text-white text-lg font-bold rounded-lg shadow-md transition">
          Start Game
        </button>
      } @else {
        <p class="text-center text-sm font-semibold text-gray-500 animate-pulse">
          Waiting for host to start...
        </p>
      }
    </div>
  </form>

</div>
